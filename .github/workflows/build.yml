name: build

on:
  - push
  - pull_request
  - workflow_dispatch

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Export env vars
        run: buildscripts/include/ci.sh export >>$GITHUB_ENV

      - uses: actions/cache@v5
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Download deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      - name: Apply HLS PNG FFmpeg patch
        run: |
          bash buildscripts/prefix/hls_png_fix.sh "buildscripts/deps/ffmpeg"

      - name: Build
        run: |
          buildscripts/include/ci.sh build

      - name: "Upload APK artifacts (default flavor: v7a + v8a + universal)"
        uses: actions/upload-artifact@v7
        with:
          name: mpv-android-apks
          path: |
            app/build/outputs/apk/default/debug/*.apk
            app/build/outputs/apk/default/release/*.apk
          if-no-files-found: error

      - name: Read app versionName
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: appver
        run: |
          v=$(grep -E '^\s*versionName\s+' app/build.gradle | head -1 | sed -E "s/.*versionName\s+\"([^\"]+)\".*/\1/")
          echo "version_name=$v" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (master only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ github.run_number }}-${{ github.sha }}
          name: "mpv-android ${{ steps.appver.outputs.version_name }} (CI #${{ github.run_number }})"
          body: |
            Automated build from commit `${{ github.sha }}`.

            **default** flavor APKs: armeabi-v7a, arm64-v8a, and universal (debug + unsigned release).
          files: |
            app/build/outputs/apk/default/debug/*.apk
            app/build/outputs/apk/default/release/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
